services:
  - type: web
    name: fit2go-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn nutrition_app.wsgi:application"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fit2go-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

databases:
  - name: fit2go-db
    databaseName: fit2go
    user: fit2go
    plan: free
